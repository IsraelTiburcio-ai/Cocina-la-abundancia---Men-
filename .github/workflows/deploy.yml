name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  validate-assets:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate critical assets on deployed site
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys
          import urllib.parse
          import urllib.request

          base = os.environ.get("PAGE_URL", "").rstrip("/")
          if not base:
            print("Missing PAGE_URL output from deploy job", file=sys.stderr)
            sys.exit(1)

          critical = [
            "index.html",
            "Portada.png",
            "styles.css",
            "script.js",
            "menu-data.js",
          ]

          v2_dir = None
          for entry in os.listdir("."):
            if os.path.isdir(entry) and "V2" in entry and entry.lower().startswith("menu"):
              v2_dir = entry
              break

          if v2_dir is None:
            print("No se encontró carpeta de Menú V2 en el repo", file=sys.stderr)
            sys.exit(1)

          for root, _, files in os.walk(v2_dir):
            for fname in files:
              if fname.startswith("."):
                continue
              rel = os.path.relpath(os.path.join(root, fname), ".").replace(os.sep, "/")
              critical.append(rel)

          failed = []
          for rel in sorted(set(critical)):
            url = f"{base}/{urllib.parse.quote(rel, safe='/')}"
            try:
              with urllib.request.urlopen(url) as resp:
                code = getattr(resp, "status", 200)
              if code >= 400:
                failed.append((rel, code, url))
              else:
                print(f"OK {code} {rel}")
            except Exception as exc:
              failed.append((rel, "ERR", f"{url} -> {exc}"))

          if failed:
            print("\nAssets con fallo:", file=sys.stderr)
            for rel, code, detail in failed:
              print(f"- [{code}] {rel}: {detail}", file=sys.stderr)
            sys.exit(1)

          print("\nValidación de assets completada correctamente.")
          PY
